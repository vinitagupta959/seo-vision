<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <script>
    (function() {
      const savedTheme = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | SEO Vision</title>
  <meta name="description" content="The page you are looking for does not exist or has been moved.">
  <link class="page-style" rel="stylesheet" href="/assets/css/style.css">
  <link class="page-style" rel="stylesheet" href="/assets/css/components/navbar.css">
  <link class="page-style" rel="stylesheet" href="/assets/css/components/buttons.css">
  <link class="page-style" rel="stylesheet" href="/assets/css/components/cards.css">
</head>
<body>

  <!-- Sticky Navbar -->
  <header>
    <div class="logo-container">
      <a href="/" class="logo-container">
        <span class="logo-icon">👁</span>
        <span class="logo-text">SEO Vision</span>
      </a>
    </div>
  </header>

  <!-- Main Container -->
  <main class="notfound-container">
    <div class="glass-panel fade-in">
      <div class="error-code">404</div>
      <h1>Page Not Found</h1>
      <p>
        The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.
      </p>
      <div class="notfound-actions">
        <a href="/" class="nav-btn nav-btn-outline">Return Home</a>
        <a href="/pages/dashboard.html" class="nav-btn nav-btn-primary">Back to Dashboard</a>
      </div>
    </div>
  </main>

  <script type="module" src="/assets/js/ui.js"></script>
</body>
</html>
