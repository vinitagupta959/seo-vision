<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <script>
    (function() {
      const savedTheme = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Profile | SEO Vision</title>
  <meta name="description" content="View and update your profile configurations on SEO Vision.">
  <link rel="stylesheet" href="/assets/css/style.css">
  <link rel="stylesheet" href="/assets/css/components/navbar.css">
  <link rel="stylesheet" href="/assets/css/components/buttons.css">
  <link rel="stylesheet" href="/assets/css/components/cards.css">
  <link rel="stylesheet" href="/assets/css/components/forms.css">
  <link rel="stylesheet" href="/assets/css/pages/profile.css">
</head>
<body>

  <!-- Sticky Navbar -->
  <header>
    <div class="logo-container">
      <a href="/pages/dashboard.html" class="logo-container">
        <span class="logo-icon">👁</span>
        <span class="logo-text">SEO Vision</span>
      </a>
    </div>
    <div class="nav-links" id="auth-nav-links">
      <!-- Dynamically rendered -->
    </div>
    <div>
      <button id="theme-toggle-btn" aria-label="Toggle Theme">☀️</button>
    </div>
  </header>

  <!-- Profile Settings Panel -->
  <main class="main-wrapper">
    <div class="profile-card glass-panel fade-in">
      <div class="profile-avatar-section">
        <img id="profile-avatar" src="https://api.dicebear.com/7.x/initials/svg?seed=User" alt="Avatar" class="profile-avatar-lg">
        <h2 id="profile-display-name">Loading Profile...</h2>
        <p id="profile-display-email" class="text-muted"></p>
      </div>

      <form id="profile-form">
        <div class="form-group">
          <label for="name" class="form-label">Full Name</label>
          <input type="text" id="name" class="form-control" required maxlength="50">
        </div>

        <div class="form-group">
          <label for="email" class="form-label">Email Address</label>
          <input type="email" id="email" class="form-control" required>
        </div>

        <div class="form-group">
          <label for="password" class="form-label">New Password (leave blank to keep current)</label>
          <input type="password" id="password" class="form-control" placeholder="••••••••" minlength="8">
        </div>

        <button type="submit" class="btn-submit" id="submit-btn">Save Profile Updates</button>
      </form>

      <button id="logout-btn" class="btn-submit logout-btn">Log Out</button>
    </div>
  </main>

  <!-- Script setup -->
  <script type="module" src="/assets/js/ui.js"></script>
  <script type="module" src="/assets/js/pages/profile.js"></script>
</body>
</html>
